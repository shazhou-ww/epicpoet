id: evt-001-灵气觉醒
title: 灵气觉醒
description: >-
  陈朴在青柳村田间劳作时，忽然感受到体内一丝异样的暖流涌动。
  他不知道这便是灵气初显——五行杂灵根虽然资质最差，但终究是有灵根的。
  同日，一个衣衫褴褛的邋遢老者途经青柳村，向陈朴讨了碗水喝。
  老者打量了陈朴半晌，嘀咕了句"有点意思"，便坐在村口老柳下不走了。
