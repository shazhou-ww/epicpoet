id: evt-002-拜师
title: 拜师
description: >-
  散人无涯在青柳村住了三日，每日只是喝酒晒太阳，偶尔看陈朴干活。
  第三日黄昏，老者忽然叫住正要回家的陈朴，问他愿不愿意学修炼。
  陈朴虽然惊讶，但谨慎地没有立刻答应，而是问老者要教什么。
  无涯哈哈大笑："教你活得久一点。"陈朴沉默片刻，一拜到底。
