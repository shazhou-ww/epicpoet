description: >-
  青柳村农家子弟，十六岁。面容平凡，皮肤黝黑，双手满是老茧。
  五行杂灵根，修炼资质在宗门看来几乎是废物。
  但他沉稳谨慎，韧性极强，善于观察细节，记忆力超群。
traits:
  - 谨慎隐忍
  - 观察力敏锐
  - 吃苦耐劳
  - 沉默寡言
  - 心思细腻
  - 倔强不服输
backstory: >-
  生于青柳村普通农户，父母早亡，由叔婶抚养长大，寄人篱下。
  从小便比同龄人多一份察言观色的敏感。
  十六岁那年，一个邋遢老者路过青柳村，喝了他递的一碗水，
  随口说了句"这孩子有点意思"，从此命运改变。
