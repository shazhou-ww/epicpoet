id: 散人无涯
name: 散人无涯
aliases:
  - 无涯
  - 邋遢老头
  - 老头子
description: >-
  外表是个衣衫褴褛、嗜酒如命的邋遢老者，头发乱如鸡窝，胡子沾着酒渍。
  看似疯疯癫癫，实则深不可测。真实修为至少化神期以上，
  曾以"无涯剑仙"之名震动修仙界，后因某事隐世。
traits:
  - 邋遢随性
  - 大智若愚
  - 嗜酒
  - 放养型教学
  - 看似不靠谱
  - 护短
  - 偶尔展露深沉
backstory: >-
  真名已不可考，数百年前是玄冰宗太上长老，修为通天。
  因一场涉及禁忌之术的变故，离开宗门云游四方。
  世人以为他已陨落，实际上他以散修身份行走天下，
  喝酒看戏，偶尔点化有缘人。收陈朴为徒，是百年来第一次。
affiliations:
  - 玄冰宗（前太上长老，已离开）
  - 散修
relationships:
  - target: 陈朴
    type: 师徒
    description: 收陈朴为徒，放养式教学，看似不管实则暗中护持
    since_epoch: 100
learns:
  - event: evt-001-灵气觉醒
    at_epoch: 100
    method: witnessed
    notes: 路过青柳村时感知到陈朴体内灵气波动，起了收徒之念
status: alive
