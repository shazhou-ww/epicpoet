description: >-
  玄冰宗嫡传弟子，十七岁。容貌清丽出尘，气质冷若冰霜。
  天生冰灵根，修炼天赋极高，十五岁便筑基成功，被誉为百年一遇的天才。
  但她冷漠外表下隐藏着一个不为人知的秘密。
traits:
  - 冷漠寡言
  - 天赋卓绝
  - 外冷内热
  - 责任感强
  - 完美主义
  - 偶有温柔
backstory: >-
  玄冰宗宗主沐天寒之女，自幼被视为宗门未来的希望。
  然而她的母亲来历成谜——据传是魔道中人，因此沐清霜体内同时流淌着
  正邪两道的血脉。这个秘密只有宗主和几位太上长老知晓。
  她刻苦修炼，一方面是为了证明自己，另一方面是为了压制体内偶尔
  翻涌的魔气。对陈朴最初不屑一顾，后来逐渐改观。
