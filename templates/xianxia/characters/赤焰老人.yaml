  - 火魔
description: >-
  魔道元婴期修士，外表是枯瘦老者，双目赤红如烈焰。
  性情阴鸷，手段狠辣，修炼的焚天魔功需要吞噬他人灵力为养分。
  近年来在苍梧山一带活动频繁，暗中搜寻某件上古遗物。
traits:
  - 阴鸷狠辣
  - 老谋深算
  - 实力强横
  - 贪婪
  - 孤傲
  - 不择手段
backstory: >-
  原为某灭门小宗的长老，百年前宗门覆灭后堕入魔道。
  修炼焚天魔功，以吞噬他人灵力突破瓶颈。
  元婴期的修为已是普通修士难以企及的高度。
  近年来似乎在寻找与禁忌之术相关的上古遗物，
  与玄冰宗数百年前的那场变故或有关联。
