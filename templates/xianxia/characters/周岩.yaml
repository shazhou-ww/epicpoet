description: >-
  玄冰宗外门弟子，十八岁。体格健壮，性格豪爽直率，脸上总带着憨厚的笑容。
  三灵根（金、土、火），资质中等，但胜在刻苦和义气。
  是陈朴在玄冰宗最早结识的朋友。
