  - 有时莽撞
  - 讲义气
backstory: >-
  矿工之子，凭借一身蛮力和不怕吃苦的精神考入玄冰宗外门。
  修炼资质一般，但从不气馁。在外门弟子中人缘极好，
  与陈朴一见如故——两人都是底层出身，都被天才弟子看不起。
  把陈朴当亲兄弟，愿意为朋友两肋插刀。
