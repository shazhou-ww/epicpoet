id: 灵气与灵石
name: 灵气与灵石
category: 修炼体系
description: >-
  **灵气**是天地间最基本的修炼能量，修士通过吸收灵气来提升修为：

  - 灵气浓度因地而异，宗门多建在灵气浓郁之处
  - 灵气分五行属性（金木水火土）以及少量特殊属性（雷、风、暗等）
  - 灵气枯竭之地无法修炼，被称为"死域"

  **灵石**是浓缩灵气的结晶体，是修仙界的通用货币：

  - **下品灵石** — 最基本单位，一枚相当于凡人十两银子
  - **中品灵石** — 等于一百枚下品灵石
  - **上品灵石** — 等于一百枚中品灵石，金丹期以上修士常用
  - **极品灵石** — 极为罕见，等于一百枚上品灵石，可用于布置大阵
  - **灵晶** — 传说级，灵气浓度是极品灵石的百倍，已近乎绝迹
tags:
