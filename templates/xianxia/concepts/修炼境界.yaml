id: 修炼境界
name: 修炼境界
category: 修炼体系
description: >-
  灵渊大陆的修炼境界分为八大境界，每个境界分初期、中期、后期、巅峰四个小阶段：

  1. **炼气期** — 感应天地灵气，引气入体，在体内开辟灵力通道。凡人踏入修炼的第一步。
  2. **筑基期** — 以灵力凝聚根基，构建灵力循环体系。筑基成功即为真正的修士。
  3. **金丹期** — 灵力在丹田凝聚成丹，修士寿命大增至五百年。可御剑飞行。
  4. **元婴期** — 金丹孕育元婴，拥有独立神识。元婴可短暂离体，战力倍增。寿命千年。
  5. **化神期** — 元婴化为神念，与天地法则初步感应。宗门掌门通常是这个级别。
  6. **合体期** — 神念与天地法则融合，掌握一到两种法则之力。
  7. **渡劫期** — 引动天劫洗礼肉身和神魂，渡劫成功则脱胎换骨。
  8. **大乘期** — 修仙界的巅峰，可撕裂空间、移山倒海。再往上便是飞升成仙。

  普通散修一生能到筑基就不错了，金丹期已是一方强者。
