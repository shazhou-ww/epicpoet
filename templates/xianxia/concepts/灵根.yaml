id: 灵根
name: 灵根
category: 修炼体系
description: >-
  灵根是修炼者感应和吸收天地灵气的天赋根基，决定修炼速度和上限：

  - **天灵根**（单属性）— 万中无一，修炼速度极快，潜力巨大。如：冰灵根、火灵根。
  - **异灵根** — 极为罕见的特殊灵根，如：雷灵根、风灵根、暗灵根。威力极大但功法稀少。
  - **双灵根** — 两种属性，资质上佳，大部分宗门天才属此类。
  - **三灵根** — 三种属性，资质中等，大部分内门弟子水平。
  - **四灵根** — 四种属性，资质中下，多为外门弟子。
  - **五行杂灵根** — 五种属性俱全，修炼速度极慢，几乎无法突破金丹期。被视为废物资质。

  灵根在出生时便已注定，目前没有已知的改变灵根的方法。
  但传说上古时期有逆天功法可以重塑灵根。
tags:
