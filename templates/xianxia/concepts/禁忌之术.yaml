id: 禁忌之术
name: 禁忌之术
category: 修炼体系
description: >-
  修仙界中被列为禁忌的功法和术法，修炼或使用者一经发现将遭到各大宗门联合追杀：

  - **夺舍术** — 以神魂侵占他人肉身，最常见的禁术之一
  - **噬灵功** — 直接吞噬他人灵力为己用，修炼速度极快但反噬严重
  - **逆天改命术** — 试图更改天道注定之事，代价极为惨烈
  - **魂灯术** — 以活人灵魂炼制灯烛，用于延寿或增强法术
  - **血祭大阵** — 以大量生灵献祭换取短暂的逆天之力

  禁忌之术并非无人修炼，魔道修士多有涉猎。
  数百年前玄冰宗曾发生一起与禁忌之术相关的重大变故，
  导致多位长老陨落，此事至今讳莫如深。
  散人无涯的离开似乎与此事有关。
tags:
  - 核心设定
