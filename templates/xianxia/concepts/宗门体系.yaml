id: 宗门体系
name: 宗门体系
category: 社会结构
description: >-
  灵渊大陆的修士组织形式，以宗门为主体：

  **宗门等级：**
  - 仙门 — 有大乘期强者坐镇，整个大陆不超过三家
  - 一流宗门 — 有化神期以上强者，在一域内举足轻重
  - 二流宗门 — 有元婴期强者，区域性势力
  - 三流宗门 — 有金丹期强者，小型势力
  - 小门小派 — 筑基期为尊，随时可能覆灭

  **宗门内部结构：**
  - 宗主 — 最高领导者
  - 太上长老 — 退隐的前任高手，关键时刻出山
  - 长老 — 各堂口负责人
  - 内门弟子 — 核心培养对象，资源优先
  - 外门弟子 — 基础弟子，通过考核可升入内门
  - 记名弟子 — 挂名弟子，享受最少资源

  **散修：**
  未加入任何宗门的独立修士。自由但资源匮乏，多数止步于筑基。
  少数散修实力惊人，如散人无涯。

  玄冰宗属于东域一流宗门。
